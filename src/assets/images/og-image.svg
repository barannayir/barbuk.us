<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Logo/Title -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle">BARBUK</text>
  
  <!-- Tagline -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="42" fill="rgba(255,255,255,0.9)" text-anchor="middle">Modernize Your Legacy Systems</text>
  
  <!-- Before/After Visual -->
  <g transform="translate(200, 400)">
    <rect x="0" y="0" width="350" height="180" fill="rgba(255,255,255,0.1)" rx="10"/>
    <text x="175" y="50" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">BEFORE</text>
    <text x="175" y="100" font-family="monospace" font-size="32" fill="rgba(239,68,68,0.8)" text-anchor="middle">Legacy</text>
  </g>
  
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="60" fill="white" text-anchor="middle">→</text>
  
  <g transform="translate(650, 400)">
    <rect x="0" y="0" width="350" height="180" fill="rgba(255,255,255,0.2)" rx="10"/>
    <text x="175" y="50" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">AFTER</text>
    <text x="175" y="100" font-family="monospace" font-size="32" fill="rgba(34,197,94,0.9)" text-anchor="middle">Modern</text>
  </g>
</svg>
